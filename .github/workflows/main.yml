name: BOT-TRADING-ACTIVO

on:
  workflow_dispatch: # Permite el botón manual de tu web y el botón de GitHub
  schedule:
    # Se ejecuta 3 veces al día (Horarios UTC)
    - cron: '30 7 * * *'  # Apertura de Londres
    - cron: '30 13 * * *' # Apertura de Nueva York
    - cron: '30 22 * * *' # Cierre de sesión y preparación de Asia

# Forzamos el uso de Node 24 para evitar avisos de obsolescencia
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # Permisos necesarios para que el bot pueda escribir el nuevo index.html
    permissions:
      contents: write

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip' # Acelera las ejecuciones guardando las librerías

      # 3. Instalar librerías necesarias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install yfinance

      # 4. Ejecutar el script del Bot
      - name: Ejecutar Bot de Trading
        run: python trading_bot.py
        env:
          # Aquí conectamos tus secretos guardados en GitHub con el script
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}

      # 5. Subir los cambios (index.html actualizado) a la web
      - name: Publicar cambios en la web
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          # El comando 'commit' solo se ejecuta si hay cambios reales
          git commit -m "🤖 Actualización automática: Análisis de mercado $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
