name: BOT-TRADING-ACTIVO

on:
  workflow_dispatch: # Botón manual
  schedule:
    - cron: '0 */2 * * *' # Se ejecuta solo cada 2 horas

# ESTA ES LA LÍNEA QUE QUITA EL ERROR DE JUNIO
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas  # Instalamos lo necesario para el RSI

      - name: Ejecutar Radar de Oportunidades
        run: python trading_bot.py
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}

      - name: Guardar Cambios en la Web
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add index.html historial.txt || true
          git commit -m "🤖 Radar Actualizado $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
